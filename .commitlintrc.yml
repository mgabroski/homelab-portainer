extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - chore
      - security
      - refactor
      - ci

  header-max-length:
    - 2
    - always
    - 72

  subject-full-stop:
    - 2
    - never
    - "."

  subject-case:
    - 2
    - always
    - lower-case
